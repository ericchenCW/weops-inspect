name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "已存在的 Git tag (如 v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ inputs.tag }}" \
            -o weops-inspect-linux-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: weops-inspect-linux-${{ matrix.goarch }}
          path: weops-inspect-linux-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes ""
          fi
          gh release upload "$TAG" \
            dist/weops-inspect-linux-amd64 \
            dist/weops-inspect-linux-arm64 \
            --clobber
